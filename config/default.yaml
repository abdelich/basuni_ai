# BasuniAI — конфигурация по умолчанию
# Секреты (токены, API-ключи) — в .env

# ID гильдии Discord
guild_id: 499894818642591744

# Каналы: ключ -> ID канала (подставьте свои ID)
# Боты привязаны к каналам через roles.<role>.xxx_channel_key
channels:
  # Старейшины: приём заявок, публикация решений, уведомления
  elder_inbox: 1475109427425050694
  elder_decisions: 1474353883018170509
  court_inbox: 1474352267996958823
  council_inbox: 1474356901650366496
  prosecutor_inbox: 1474357751873405064
  kpp_inbox: 1474368849758650452
  referrals: 1475128588167680062
  # Закон: база (гос-образующие прецеденты) и судебные прецеденты. Заполни ID каналов (напр. 📃гос-образующие-преценденты, 🧑‍⚖️-судебные-преценденты). Все агенты действуют только по закону.
  law_base_precedents: 0
  law_judicial_precedents: 0

# ID ролей Discord (для проверки полномочий).
# pmj — роль ПМЖ: только пользователи с этой ролью могут обращаться к старейшинам. Если 0 — проверка отключена.
role_ids:
  pmj: 1474389076051361874
  vnj: 1474388540786737367
  temporary: 1474386228475461643
  elder: 1474908542237544502
  council: 1474393655853715550
  prosecutor: 1474391909249318994
  kpp: 1474390784621940952
  judge: 1474393550866350151

# Категория «право»: её подканалы содержат прецеденты и закон. Все агенты смотрят на закон и действуют только по нему.
reference_category_name: "📜 право"

# Ключи каналов закона (из channels): база (гос-образующие) и судебные прецеденты (для суда и агентов).
law_channels:
  base_precedents_key: law_base_precedents
  judicial_precedents_key: law_judicial_precedents

# Какие боты запускать (ключи: elder, council, prosecutor, kpp, judge)
enabled_roles:
  - elder

# Привязка каналов и опции по ролям
# xxx_channel_key — ключ из блока channels выше
roles:
  elder:
    # Срок (часов), за который суд должен принять решение по переданному делу (оба судьи). По истечении старейшина решает по закону.
    court_deadline_hours: 24
    inbox_channel_key: elder_inbox      # куда граждане пишут заявки
    decisions_channel_key: elder_decisions  # куда бот публикует решения
    outbox_channel_key: elder_inbox     # куда отвечать по умолчанию (можно тред)
    notify_court_channel_key: court_inbox
    notify_council_channel_key: council_inbox
    referrals_channel_key: referrals
    # Каналы надзора: при каждом сообщении старейшина проверяет легитимность действия (суд, совет, прокурор, КПП, рефералы)
    watch_channel_keys: [court_inbox, council_inbox, prosecutor_inbox, kpp_inbox, referrals]
    # Зарезервировано: каналы, в которые старейшина может отправлять уведомления (в коде пока не используется)
    may_notify_channel_keys: [elder_inbox, elder_decisions, court_inbox, council_inbox, prosecutor_inbox, kpp_inbox, referrals]